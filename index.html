<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>Александр — персональный водитель</title>
<style>
  :root{
    --bg:#F4F1EA;
    --navy:#1D2A44;
    --cream:#F4F1EA;
    --white:#FFFFFF;
    --red:#C91A23;
    --shadow: 0 10px 30px rgba(29,42,68,0.08), 0 2px 8px rgba(29,42,68,0.06);
  }

  *{box-sizing:border-box; -webkit-tap-highlight-color: transparent;}

  html,body{
    margin:0;
    padding:0;
    background:var(--bg);
    font-family: Arial, Helvetica, sans-serif;
    color:var(--navy);
    -webkit-font-smoothing:antialiased;
  }

  body{
    padding-bottom: 92px; /* space for sticky footer */
  }

  h1,h2,h3{
    font-family: Georgia, 'Times New Roman', serif;
    margin:0;
  }

  img{max-width:100%;}

  a{ text-decoration:none; color:inherit; }

  /* ===== Block 1: Hero photo ===== */
  .hero{
    width:100%;
    display:block;
    overflow:hidden;
  }
  .hero img{
    width:100%;
    height:auto;
    display:block;
    border-bottom-left-radius: 28px;
    border-bottom-right-radius: 28px;
  }

  /* ===== Block 2: Name ===== */
  .name{
    text-align:center;
    font-size: 34px;
    letter-spacing: 3px;
    font-weight:700;
    color:var(--navy);
    margin-top: 22px;
    margin-bottom: 4px;
  }

  .tagline{
    text-align:center;
    font-family: Arial, sans-serif;
    font-size: 13px;
    letter-spacing: 1.5px;
    color: #6b7383;
    text-transform: uppercase;
    margin-bottom: 22px;
  }

  /* ===== Block 3: Stats ===== */
  .stats{
    display:flex;
    justify-content:center;
    align-items:flex-start;
    gap: 0;
    padding: 0 20px;
    margin-bottom: 26px;
  }
  .stats .stat{
    flex:1;
    text-align:center;
    padding: 0 8px;
    position:relative;
  }
  .stats .stat:not(:last-child)::after{
    content:"";
    position:absolute;
    right:0;
    top:6px;
    bottom:6px;
    width:1px;
    background: rgba(29,42,68,0.15);
  }
  .stat .num{
    font-family: Georgia, serif;
    font-size: 26px;
    font-weight:700;
    color:var(--navy);
    line-height:1.1;
  }
  .stat .label{
    font-family: Arial, sans-serif;
    font-size: 11px;
    letter-spacing: 0.8px;
    color: #4a5266;
    margin-top: 4px;
    text-transform:uppercase;
  }

  /* ===== Block 4: Advantages ===== */
  .advantages{
    background: var(--navy);
    margin: 0 16px 34px 16px;
    border-radius: 24px;
    padding: 26px 10px;
    display:flex;
    justify-content:space-between;
    box-shadow: var(--shadow);
  }
  .advantage{
    flex:1;
    display:flex;
    flex-direction:column;
    align-items:center;
    text-align:center;
    padding: 0 4px;
  }
  .advantage .icon-circle{
    width:56px;
    height:56px;
    border-radius:50%;
    border: 1.5px solid rgba(244,241,234,0.55);
    display:flex;
    align-items:center;
    justify-content:center;
    margin-bottom:10px;
  }
  .advantage .icon-circle svg{
    width:24px;
    height:24px;
    stroke: var(--cream);
    fill:none;
  }
  .advantage span{
    color: var(--cream);
    font-family: Arial, sans-serif;
    font-size: 12px;
    font-weight:600;
    line-height:1.3;
  }

  /* ===== Block 5: Services ===== */
  .services-section{
    padding: 0 20px;
  }
  .eyebrow{
    font-family: Arial, sans-serif;
    font-size: 12px;
    letter-spacing: 2px;
    color: var(--red);
    text-transform: uppercase;
    font-weight:700;
    margin-bottom: 6px;
  }
  .section-title{
    font-size: 28px;
    color: var(--navy);
    margin-bottom: 20px;
    line-height:1.25;
  }

  .service-card{
    background: var(--white);
    border-radius: 20px;
    padding: 20px;
    margin-bottom: 16px;
    box-shadow: var(--shadow);
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap: 14px;
    cursor:pointer;
    transition: transform 0.15s ease, box-shadow 0.15s ease;
    border: none;
    text-align:left;
    width:100%;
  }
  .service-card:active,
  .service-card.pressed{
    transform: scale(0.98);
    box-shadow: 0 4px 14px rgba(29,42,68,0.10);
  }
  .service-card .service-text h3{
    font-family: Arial, sans-serif;
    font-size: 17px;
    font-weight:700;
    color: var(--navy);
    margin-bottom: 6px;
  }
  .service-card .service-text p{
    font-family: Arial, sans-serif;
    font-size: 13.5px;
    color: #55607a;
    line-height:1.45;
    margin:0;
  }
  .service-card .arrow-circle{
    flex-shrink:0;
    width:38px;
    height:38px;
    border-radius:50%;
    background: var(--red);
    display:flex;
    align-items:center;
    justify-content:center;
  }
  .service-card .arrow-circle svg{
    width:16px;
    height:16px;
    stroke:#fff;
    fill:none;
    stroke-width:2.4;
  }

  /* ===== Modal ===== */
  .modal-overlay{
    position:fixed;
    inset:0;
    background: rgba(29,42,68,0.55);
    display:flex;
    align-items:flex-end;
    justify-content:center;
    opacity:0;
    pointer-events:none;
    transition: opacity 0.25s ease;
    z-index: 1000;
    padding: 0;
  }
  .modal-overlay.active{
    opacity:1;
    pointer-events:auto;
  }
  .modal-box{
    background: var(--cream);
    width:100%;
    max-width: 480px;
    border-top-left-radius: 26px;
    border-top-right-radius: 26px;
    padding: 26px 22px calc(26px + env(safe-area-inset-bottom, 0px)) 22px;
    transform: translateY(100%);
    transition: transform 0.3s cubic-bezier(.32,.72,0,1);
    box-shadow: 0 -10px 40px rgba(29,42,68,0.25);
  }
  .modal-overlay.active .modal-box{
    transform: translateY(0);
  }
  .modal-handle{
    width:40px;
    height:4px;
    background: rgba(29,42,68,0.2);
    border-radius:2px;
    margin: 0 auto 18px auto;
  }
  .modal-box h3{
    font-family: Georgia, serif;
    font-size: 20px;
    color: var(--navy);
    text-align:center;
    margin-bottom: 4px;
  }
  .modal-box .modal-service{
    text-align:center;
    font-family: Arial, sans-serif;
    font-size: 13px;
    color:#6b7383;
    margin-bottom: 20px;
  }
  .modal-buttons{
    display:flex;
    flex-direction:column;
    gap: 12px;
  }
  .modal-btn{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:10px;
    padding: 15px 18px;
    border-radius: 16px;
    font-family: Arial, sans-serif;
    font-weight:700;
    font-size: 15px;
    transition: transform 0.15s ease;
  }
  .modal-btn:active{ transform: scale(0.98); }
  .modal-btn svg{ width:20px; height:20px; }
  .modal-btn.tg{
    background: var(--navy);
    color: var(--cream);
  }
  .modal-btn.wa{
    background: #25D366;
    color: #ffffff;
  }
  .modal-close{
    display:block;
    text-align:center;
    margin-top: 16px;
    font-family: Arial, sans-serif;
    font-size: 13px;
    color:#8a90a1;
    padding: 6px;
  }

  /* ===== Sticky Footer ===== */
  .sticky-footer{
    position:fixed;
    left:0;
    right:0;
    bottom:0;
    background: var(--navy);
    padding: 12px 14px calc(12px + env(safe-area-inset-bottom, 0px)) 14px;
    display:flex;
    gap: 10px;
    z-index: 900;
    box-shadow: 0 -4px 20px rgba(0,0,0,0.15);
  }
  .footer-btn{
    flex:1;
    display:flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    padding: 13px 8px;
    border-radius: 14px;
    background: rgba(244,241,234,0.08);
    border: 1px solid rgba(244,241,234,0.25);
    color: var(--cream);
    font-family: Arial, sans-serif;
    font-size: 13.5px;
    font-weight:700;
    transition: transform 0.15s ease, background 0.15s ease;
  }
  .footer-btn:active{
    transform: scale(0.96);
    background: rgba(244,241,234,0.18);
  }
  .footer-btn.call{
    flex: 0 0 52px;
    padding: 13px 0;
  }
  .footer-btn svg{
    width:19px;
    height:19px;
    stroke: var(--cream);
    fill:none;
    flex-shrink:0;
  }

  @media (min-width: 520px){
    .name{ font-size:40px; }
    .section-title{ font-size:32px; }
  }
</style>
</head>

    var modalClose = document.getElementById('modalClose');
    var cards = document.querySelectorAll('.service-card');

    function openModal(serviceLabel, waLink, tgLink){
      modalServiceName.textContent = serviceLabel;
      modalTg.href = tgLink;
      modalWa.href = waLink;
      modal.classList.add('active');
      document.body.style.overflow = 'hidden';

    function closeModal(){
      modal.classList.remove('active');
      document.body.style.overflow = '';
    }

    cards.forEach(function(card){
      card.addEventListener('click', function(){
        openModal(
          card.getAttribute('data-service'),
          card.getAttribute('data-wa'),
          card.getAttribute('data-tg')
        );
      });
    });

    modalClose.addEventListener('click', closeModal);
    modal.addEventListener('click', function(e){
      if(e.target === modal){ closeModal(); }
    });
  })();
